stages:
  - build
  - merge

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

build:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--mtu=1400"]
  parallel:
    matrix:
      - VARIANT: [Release, Debug]
        PLATFORM: [linux/amd64, linux/arm64]
  artifacts:
    paths:
      - digests/
    expire_in: 1 day
  before_script:
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --use --driver docker-container
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker buildx build \
        --platform $PLATFORM \
        --build-arg BUILD_VARIANT=$VARIANT \
        --tag $CI_REGISTRY_IMAGE:ci-${CI_JOB_ID} \
        --provenance=false \
        --push \
        .
    - |
      PLATFORM_FILE=$(echo "$PLATFORM" | tr '/' '-')
      mkdir -p digests/$VARIANT
      digest=$(docker buildx imagetools inspect $CI_REGISTRY_IMAGE:ci-${CI_JOB_ID} \
        | grep -E '^Digest:' | awk '{print $2}')
      touch "digests/$VARIANT/${PLATFORM_FILE}@${digest#sha256:}"
    - docker buildx imagetools remove $CI_REGISTRY_IMAGE:ci-${CI_JOB_ID} || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG =~ /^v.*/

merge:
  stage: merge
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--mtu=1400"]
  parallel:
    matrix:
      - VARIANT: [Release, Debug]
  needs:
    - job: build
      artifacts: true
  before_script:
    - docker buildx create --use --driver docker-container
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      SUFFIX=$(echo "$VARIANT" | tr '[:upper:]' '[:lower:]')
      TAG_ARGS="--tag $CI_REGISTRY_IMAGE:sha-${CI_COMMIT_SHORT_SHA}-${SUFFIX}"

      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        TAG_ARGS="$TAG_ARGS --tag $CI_REGISTRY_IMAGE:latest-${SUFFIX}"
      fi

      if echo "$CI_COMMIT_TAG" | grep -q '^v'; then
        VERSION="${CI_COMMIT_TAG#v}"
        TAG_ARGS="$TAG_ARGS --tag $CI_REGISTRY_IMAGE:v${VERSION}-${SUFFIX}"
      fi

      REF_ARGS=""
      for f in digests/$VARIANT/*; do
        filename=$(basename "$f")
        platform="${filename%%@*}"
        sha="${filename#*@}"
        arch="${platform##*-}"

        REF_ARGS="$REF_ARGS $CI_REGISTRY_IMAGE@sha256:$sha"

        # Single-arch tags (point directly to the platform-specific image)
        if [ "$CI_COMMIT_BRANCH" = "master" ]; then
          docker buildx imagetools create \
            --tag $CI_REGISTRY_IMAGE:latest-${SUFFIX}-${arch} \
            $CI_REGISTRY_IMAGE@sha256:$sha
        fi
        if echo "$CI_COMMIT_TAG" | grep -q '^v'; then
          VERSION="${CI_COMMIT_TAG#v}"
          docker buildx imagetools create \
            --tag $CI_REGISTRY_IMAGE:v${VERSION}-${SUFFIX}-${arch} \
            $CI_REGISTRY_IMAGE@sha256:$sha
        fi
      done

      # Multi-arch manifest (combines both platforms)
      docker buildx imagetools create $TAG_ARGS $REF_ARGS
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG =~ /^v.*/
