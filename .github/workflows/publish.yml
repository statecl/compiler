name: Build and Push Docker Images

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        distro: [alpine, debian, ubuntu, fedora]
        variant: [release, debug, asan, tsan, ubsan]
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        exclude:
          - distro: alpine
            variant: asan
          - distro: alpine
            variant: tsan
          - distro: alpine
            variant: ubsan
    env:
      PLATFORM: ${{ matrix.runner == 'ubuntu-24.04-arm' && 'linux/arm64' || 'linux/amd64' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Map variant
        id: args
        run: |
          case ${{ matrix.variant }} in
            release) echo "build_variant=Release" >> "$GITHUB_OUTPUT"; echo "sanitizer=off" >> "$GITHUB_OUTPUT"; echo "suffix=release" >> "$GITHUB_OUTPUT" ;;
            debug)   echo "build_variant=Debug" >> "$GITHUB_OUTPUT";   echo "sanitizer=off" >> "$GITHUB_OUTPUT"; echo "suffix=debug" >> "$GITHUB_OUTPUT" ;;
            asan)    echo "build_variant=Debug" >> "$GITHUB_OUTPUT";   echo "sanitizer=asan" >> "$GITHUB_OUTPUT"; echo "suffix=debug-asan" >> "$GITHUB_OUTPUT" ;;
            tsan)    echo "build_variant=Debug" >> "$GITHUB_OUTPUT";   echo "sanitizer=tsan" >> "$GITHUB_OUTPUT"; echo "suffix=debug-tsan" >> "$GITHUB_OUTPUT" ;;
            ubsan)   echo "build_variant=Debug" >> "$GITHUB_OUTPUT";   echo "sanitizer=ubsan" >> "$GITHUB_OUTPUT"; echo "suffix=debug-ubsan" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Generate tags
        id: tags
        run: |
          ARCH="${{ matrix.runner == 'ubuntu-24.04-arm' && 'arm64' || 'amd64' }}"
          SUFFIX="${{ steps.args.outputs.suffix }}"
          DISTRO="${{ matrix.distro }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          TAGS="${IMAGE}:sha-${GITHUB_SHA::8}-${SUFFIX}-${DISTRO}-${ARCH}"

          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TAGS="${TAGS},${IMAGE}:latest-${SUFFIX}-${DISTRO}-${ARCH}"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${TAGS},${IMAGE}:v${VERSION}-${SUFFIX}-${DISTRO}-${ARCH}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.distro }}/Dockerfile
          platforms: ${{ env.PLATFORM }}
          build-args: |
            BUILD_VARIANT=${{ steps.args.outputs.build_variant }}
            SANITIZER=${{ steps.args.outputs.sanitizer }}
          tags: ${{ steps.tags.outputs.tags }}
          push: true
          provenance: false


