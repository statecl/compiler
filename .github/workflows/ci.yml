name: Build and Push Docker Images

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        distro: [alpine, debian, ubuntu, fedora, rocky, alma, oracle, amazon]
        variant: [release, debug, asan, tsan, ubsan]
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        exclude:
          - distro: alpine
            variant: asan
          - distro: alpine
            variant: tsan
          - distro: alpine
            variant: ubsan
    permissions:
      contents: read
      packages: write
    env:
      PLATFORM: ${{ matrix.runner == 'ubuntu-24.04-arm' && 'linux/arm64' || 'linux/amd64' }}
      ARCH: ${{ matrix.runner == 'ubuntu-24.04-arm' && 'arm64' || 'amd64' }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4.1.0

      - name: Map variant
        id: args
        run: |
          case ${{ matrix.variant }} in
            release) echo "build_variant=Release" >> "$GITHUB_OUTPUT"; echo "sanitizer=off"      >> "$GITHUB_OUTPUT"; echo "suffix=release"      >> "$GITHUB_OUTPUT" ;;
            debug)   echo "build_variant=Debug"   >> "$GITHUB_OUTPUT"; echo "sanitizer=off"      >> "$GITHUB_OUTPUT"; echo "suffix=debug"        >> "$GITHUB_OUTPUT" ;;
            asan)    echo "build_variant=Debug"   >> "$GITHUB_OUTPUT"; echo "sanitizer=asan"     >> "$GITHUB_OUTPUT"; echo "suffix=debug-asan"   >> "$GITHUB_OUTPUT" ;;
            tsan)    echo "build_variant=Debug"   >> "$GITHUB_OUTPUT"; echo "sanitizer=tsan"     >> "$GITHUB_OUTPUT"; echo "suffix=debug-tsan"   >> "$GITHUB_OUTPUT" ;;
            ubsan)   echo "build_variant=Debug"   >> "$GITHUB_OUTPUT"; echo "sanitizer=ubsan"    >> "$GITHUB_OUTPUT"; echo "suffix=debug-ubsan"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build and push
        run: |
          DISTRO="${{ matrix.distro }}"
          SUFFIX="${{ steps.args.outputs.suffix }}"
          BUILD_VARIANT="${{ steps.args.outputs.build_variant }}"
          SANITIZER="${{ steps.args.outputs.sanitizer }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          BUILD_ARGS="--build-arg BUILD_VARIANT=$BUILD_VARIANT"
          if [ "$SANITIZER" != "off" ]; then
            BUILD_ARGS="$BUILD_ARGS --build-arg SANITIZER=$SANITIZER"
          fi

          TAGS=""
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TAGS="$TAGS --tag ${IMAGE}:latest-${SUFFIX}-${DISTRO}-${ARCH}"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="$TAGS --tag ${IMAGE}:v${VERSION}-${SUFFIX}-${DISTRO}-${ARCH}"
          fi

          docker buildx build \
            --platform ${{ env.PLATFORM }} \
            -f $DISTRO/Dockerfile \
            $BUILD_ARGS \
            --load \
            -t probe:${GITHUB_RUN_ID} \
            .

          LABELS=$(docker run --rm probe:${GITHUB_RUN_ID} python3 -c "
import json
with open('/etc/image-versions.json') as f:
    d = json.load(f)
def walk(p, o):
    for k, v in o.items():
        kk = f'{p}.{k}' if p else k
        if isinstance(v, dict):
            walk(kk, v)
        else:
            print(f'--label io.statecl.{kk.replace(chr(46), chr(45))}={v}')
walk('', d)
")

          eval docker buildx build \
            --platform ${{ env.PLATFORM }} \
            -f $DISTRO/Dockerfile \
            $BUILD_ARGS \
            $TAGS \
            $LABELS \
            --provenance=true \
            --push \
            .